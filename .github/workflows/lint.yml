---
name: Lint

on: # yamllint disable-line rule:truthy
  workflow_call:
    outputs:
      workflow_output:
        description: Lint output
        value: ${{ jobs.golangci_lint.outputs.output_failure }}

jobs:
  golangci_lint:
    name: Run Golang Lint
    runs-on: ubuntu-latest
    outputs:
      output_failure: ${{ steps.lint_failure.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: ${{ vars.GO_VERSION }}
          cache: false

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.10.1
          args: --timeout 10m --verbose

      - name: Lint Failed
        if: failure()
        id: lint_failure
        run: echo "result=false" >> $GITHUB_OUTPUT
