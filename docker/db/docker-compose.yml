# e2e/docker-compose.yml
version: "3.5"

networks:
  default:
    name: syncer-e2e

services:
  syncer-db:
    container_name: syncer-db
    image: postgres:15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - 5433:5432
    volumes:
      - ../../scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_USER=syncer
      - POSTGRES_PASSWORD=syncer
      - POSTGRES_DB=syncer_e2e